<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="web.css" />
    
</head>
<body>
    <div id="header">
        <div id="start" class="header start">
        </div>
        <div id="centre" class="header centre">
            <p> centre</p>
        </div>
        <div id="end" class="header end">
            <div id="login-content-header">
                <button id="login-header-button">Login</button>
            </div>
        </div>
    </div>
    <div id="popup-wrapper">
        <div id="popup-content">
            <span id="login-head">
                <p id="close-login" class="button">x</p>
            </span>
            <ul>
                <li class="login-field">
                    <label>Username</label>
                    <input id="username-login-input" class="login input" type="text">
                </li>
                <li id="password-field" class="login-field">
                    <label>Password</label>
                    <input id="password-login-input" class="login input" type="password">
                </li>
                <li class="login-field login-buttons">
                    <button id="login-con-signup-btn">Sign Up</button>
                    <button id="login-con-login-btn">Login</button>
                </li>
            </ul>
        </div>
    </div>
    <div id="main-container">
        <div id="sidebar">
            <div class="sidebar-header">
                <div style="flex: 1;"><br></div>
                <div style="min-width: 30px; width: 30px;">
                    <div class="McButton" data-hamburger-menu>
                        <b></b>
                        <b></b>
                        <b></b>
                    </div>
                </div>
            </div>
            <div id="sidebar-content">
                <p>Create a route</p>
                <button id="add-route-point">+</button>
                <div id="route-point-container"></div>
                <p id="calc-route-button" class="button">calculate the route</p>
            </div>
        </div>
        <div id="map"></div>
    </div>
    <script type="module" src="main.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@mapbox/polyline"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.3.0/dist/leaflet.markercluster.js"></script>
    <script src="map.js"></script>

</body>
</html>
